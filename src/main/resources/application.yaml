server:
  port: ${PORT:8086}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5435/retirodb}
    username: ${DB_USER:retirouser}
    password: ${DB_PASSWORD:passwordUser}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

mailchimp:
  api-key: ${MAILCHIMP_API_KEY:}
  server-prefix: ${MAILCHIMP_SERVER_PREFIX:}
  audience-id: ${MAILCHIMP_AUDIENCE_ID:}