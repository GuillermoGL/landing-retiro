version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: retiro-postgres
    restart: always
    environment:
      POSTGRES_DB: retirodb
      POSTGRES_USER: retirouser
      POSTGRES_PASSWORD: passwordUser
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: retiro-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@retiro.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8087:80"
    depends_on:
      - postgres

volumes:
  postgres_data: